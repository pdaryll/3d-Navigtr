<svg width="200" height="200" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <!-- 
      SVG Logo for "Wildcats Companion" (Lion Version - Redesigned)
      A more detailed and recognizable lion silhouette with a full mane,
      set within a map pin to symbolize navigation.
      Colors: Deep Red (#A60D0D), Gold (#FFC700), White (#FFFFFF)
    -->

    <!-- Background Map Pin -->
    <path d="M50 0 C27.9 0 8 19.9 8 42 C8 73 50 98 50 98 C50 98 92 73 92 42 C92 19.9 72.1 0 50 0 Z" fill="#A60D0D"/>

    <!-- Inner Circle -->
    <circle cx="50" cy="42" r="32" fill="#FFC700"/>

    <!-- Lion Silhouette -->
    <g transform="translate(0, 4)">
        <!-- Lion Head and Mane Shape (White) -->
        <path d="M50,20
                 C 58,18 65,20 69,25
                 L 75,30 C 80,35 81,42 79,48
                 C 77,55 78,63 72,68
                 L 65,72 C 60,75 50,76 40,75
                 L 35,72 C 30,70 25,65 24,60
                 C 22,52 23,45 27,40
                 L 31,32 C 35,25 42,18 50,20 Z"
              fill="#FFFFFF"/>
        
        <!-- Facial features are cut out from the main shape, showing the gold background -->
        
        <!-- Eyes -->
        <circle cx="42" cy="45" r="4" fill="#FFC700"/>
        <circle cx="58" cy="45" r="4" fill="#FFC700"/>
        <path d="M41,45 C41.5,43 42.5,43 43,45 C42.5,47 41.5,47 41,45 Z" fill="#A60D0D"/>
        <path d="M57,45 C57.5,43 58.5,43 59,45 C58.5,47 57.5,47 57,45 Z" fill="#A60D0D"/>


        <!-- Nose and Muzzle -->
        <path d="M50,52
                 C 54,52 56,55 55,59
                 L 50,64
                 L 45,59 C 44,55 46,52 50,52 Z"
              fill="#A60D0D"/>
        <path d="M47,59 L53,59" stroke="#FFC700" stroke-width="1.5" stroke-linecap="round"/>

    </g>

</svg>
